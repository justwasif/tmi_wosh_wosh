version: '3.8'

services:
  # Local blockchain (Foundry Anvil)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: anvil --host 0.0.0.0 --port 8545 --block-time 2
    ports:
      - "8545:8545"
    networks:
      - chainx

  # Oracle service
  oracle:
    build:
      context: ./oracle
      dockerfile: Dockerfile
    environment:
      - ORACLE_RPC_URL=http://anvil:8545
      - ORACLE_PRIVATE_KEY=${ORACLE_PRIVATE_KEY}
      - ORACLE_PRODUCT_IDS=${ORACLE_PRODUCT_IDS}
      - ORACLE_INTERVAL_MS=${ORACLE_INTERVAL_MS}
      - PRODUCT_REGISTRY_ADDRESS=${PRODUCT_REGISTRY_ADDRESS}
    depends_on:
      - anvil
    networks:
      - chainx
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_WALLETCONNECT_PROJECT_ID=${VITE_WALLETCONNECT_PROJECT_ID}
      - VITE_STAKEHOLDER_REGISTRY_ADDRESS=${VITE_STAKEHOLDER_REGISTRY_ADDRESS}
      - VITE_PRODUCT_REGISTRY_ADDRESS=${VITE_PRODUCT_REGISTRY_ADDRESS}
      - VITE_ESCROW_ADDRESS=${VITE_ESCROW_ADDRESS}
    depends_on:
      - anvil
    networks:
      - chainx

networks:
  chainx:
    driver: bridge